<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub活動ダッシュボード - DaisukeHori</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:rgba(255,255,255,0.06);--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--purple:#8b7cf7;--green:#22c55e;--coral:#ef4444;--blue:#3b82f6;--amber:#f59e0b;--cyan:#06b6d4;--radius:16px;--radius-sm:10px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.tz-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap}
.tz-bar label{font-size:12px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.tz-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .15s}
.tz-btn:hover{border-color:var(--purple);color:var(--text)}
.tz-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.tz-custom{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 10px;border-radius:10px;font-family:'JetBrains Mono',monospace;width:70px;text-align:center}
.tz-custom:focus{outline:none;border-color:var(--purple)}
.tz-display{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto}
.hero{background:linear-gradient(135deg,rgba(139,124,247,0.08),rgba(34,197,94,0.06));border:1px solid var(--border);border-radius:20px;padding:2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(139,124,247,0.08),transparent 70%);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.hero-label{font-size:13px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.hero-date{font-size:15px;font-weight:500;color:var(--text2)}
.hero-badge{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.badge-auto{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-streak{background:rgba(245,158,11,0.15);color:var(--amber)}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.hero-stat{text-align:center}
.hero-stat .num{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;margin-bottom:4px;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stat:nth-child(2) .num{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat:nth-child(3) .num{background:linear-gradient(135deg,var(--amber),var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat:nth-child(4) .num{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat .pct{font-size:10px;color:var(--cyan);margin-top:4px;font-weight:400;opacity:.9}
.hero-sub-stats{display:flex;gap:24px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);flex-wrap:wrap}
.repo-delta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:12px}
.repo-delta{background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.repo-delta .rname{color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.repo-delta .rstat{display:flex;gap:8px;align-items:center;white-space:nowrap}
.repo-delta .rloc{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px}
.repo-delta .rpct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500}
.rpct.up{color:var(--green)}.rpct.down{color:var(--coral)}.rpct.zero{color:var(--text3)}
.bench-note{font-size:10px;color:var(--text3);margin-top:16px;text-align:right;opacity:.7}
.bench-note a{text-decoration:none}
.hero-stat .equiv{font-size:11px;color:var(--amber);margin-top:4px;font-weight:400;opacity:.85}
.hero-stat .label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.num{animation:fadeUp .6s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hero-stat:nth-child(2) .num{animation-delay:.1s}
.hero-stat:nth-child(3) .num{animation-delay:.2s}
.hero-stat:nth-child(4) .num{animation-delay:.3s}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-today{display:grid;grid-template-columns:3fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--surface);border-radius:var(--radius);padding:1.5rem;border:1px solid var(--border)}
.card h2{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .icon{font-size:16px}
.chart-wrap{position:relative;width:100%}
.h180{height:180px}.h220{height:220px}.h160{height:160px}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.summary-item{background:var(--surface);border-radius:var(--radius-sm);padding:1rem;border:1px solid var(--border);text-align:center}
.summary-item .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.summary-item .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.c-purple{color:var(--purple)}.c-green{color:var(--green)}.c-coral{color:var(--coral)}.c-blue{color:var(--blue)}
.commit-list{max-height:380px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.commit-item{display:grid;grid-template-columns:80px 100px 1fr 50px;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.commit-item:last-child{border-bottom:none}
.commit-time{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px}
.commit-repo{color:var(--purple);font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.commit-msg{color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.commit-sha{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;text-align:right}
.legend{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.line-dot{width:12px;height:2px;border-radius:1px;display:inline-block}
.footer{text-align:center;padding:2rem 0 1rem;font-size:11px;color:var(--text3)}
.footer a{color:var(--purple);text-decoration:none}
.loading{text-align:center;padding:4rem;color:var(--text3);font-size:14px}
.sub-title{font-size:12px;color:var(--text3);margin-top:16px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
@media(max-width:768px){.container{padding:1rem}.hero-grid{grid-template-columns:repeat(2,1fr);gap:12px}.hero-stat .num{font-size:36px}.grid-2,.grid-today,.summary-bar{grid-template-columns:1fr}.commit-item{grid-template-columns:70px 80px 1fr 40px}}
</style>
</head>
<body>
<div class="container">
  <div class="tz-bar">
    <label>🌐 Timezone:</label>
    <button class="tz-btn" data-tz="9" onclick="setTZ(9)">JST (UTC+9)</button>
    <button class="tz-btn" data-tz="0" onclick="setTZ(0)">UTC</button>
    <button class="tz-btn" data-tz="-5" onclick="setTZ(-5)">EST (UTC-5)</button>
    <button class="tz-btn" data-tz="-8" onclick="setTZ(-8)">PST (UTC-8)</button>
    <button class="tz-btn" data-tz="8" onclick="setTZ(8)">CST (UTC+8)</button>
    <button class="tz-btn" data-tz="1" onclick="setTZ(1)">CET (UTC+1)</button>
    <span style="font-size:11px;color:var(--text3)">or</span>
    <input type="number" class="tz-custom" id="tzCustom" min="-12" max="14" step="1" placeholder="±hrs" onchange="setTZ(Number(this.value))">
    <span class="tz-display" id="tzDisplay"></span>
  </div>
  <div id="dashboard"><div class="loading">⏳ Loading data...</div></div>
</div>

<script>
Chart.defaults.font.family="'Noto Sans JP',sans-serif";
Chart.defaults.color='#71717a';
const G='rgba(255,255,255,0.04)',TC='#52525b';
const TT={backgroundColor:'#27272a',titleColor:'#fafafa',bodyColor:'#a1a1aa',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,cornerRadius:8};
function fmtLoc(n){if(n>=1000000)return (n/1000000).toFixed(1)+'M';if(n>=1000)return (n/1000).toFixed(1)+'K';return String(n)}
function pctStr(delta,total){if(total<=0)return '—';const p=(delta/total*100);return (p>=0?'+':'')+p.toFixed(2)+'%'}
function buildRepoDeltaHTML(a){
  if(!a.repoLoc||Object.keys(a.repoLoc).length===0)return '';
  // Calc today's add/del per repo
  const todayByRepo={};
  if(RAW&&RAW.commits){
    for(const c of RAW.commits){
      const loc=toLocal(c.utc,CUR_TZ);
      if(dateStr(loc)===a.today){
        if(!todayByRepo[c.repo])todayByRepo[c.repo]={add:0,del:0};
        todayByRepo[c.repo].add+=c.add;
        todayByRepo[c.repo].del+=c.del;
      }
    }
  }
  const sorted=Object.entries(a.repoLoc).sort((x,y)=>y[1]-x[1]);
  return sorted.map(([repo,loc])=>{
    const t=todayByRepo[repo]||{add:0,del:0};
    const net=t.add-t.del;
    const pct=loc>0?(net/loc*100):0;
    const cls=net>0?'up':net<0?'down':'zero';
    const sign=net>0?'+':'';
    return '<div class="repo-delta"><span class="rname">'+esc(repo)+'</span><span class="rstat"><span class="rloc">'+fmtLoc(loc)+'</span><span class="rpct '+cls+'">'+sign+pct.toFixed(2)+'%</span></span></div>';
  }).join('');
}
const PALETTE=["#8b7cf7","#34d399","#fbbf24","#f97066","#60a5fa","#c084fc","#fb923c","#a78bfa","#38bdf8","#4ade80","#e879f9","#f472b6"];

let RAW=null, CHARTS=[], CUR_TZ=9;
const saved=localStorage.getItem('dashboard_tz');
if(saved!==null) CUR_TZ=Number(saved);

function highlightTZ(){
  document.querySelectorAll('.tz-btn').forEach(b=>{b.classList.toggle('active',Number(b.dataset.tz)===CUR_TZ)});
  const sign=CUR_TZ>=0?'+':'';
  document.getElementById('tzDisplay').textContent=`UTC${sign}${CUR_TZ} — ${new Date().toLocaleString('ja-JP',{timeZone:tzName(CUR_TZ),hour:'2-digit',minute:'2-digit'})} now`;
  document.getElementById('tzCustom').value=CUR_TZ;
}
function tzName(offset){
  const map={9:'Asia/Tokyo',0:'UTC','-5':'America/New_York','-8':'America/Los_Angeles',8:'Asia/Shanghai',1:'Europe/Berlin'};
  return map[String(offset)]||'UTC';
}
function setTZ(offset){CUR_TZ=offset;localStorage.setItem('dashboard_tz',String(offset));highlightTZ();if(RAW)render(RAW)}
function toLocal(utcStr,offset){const d=new Date(utcStr);return new Date(d.getTime()+offset*3600000)}
function dateStr(d){return d.getFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')}
function shortDate(d){return(d.getUTCMonth()+1)+'/'+d.getUTCDate()}
function timeStr(d){return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')}
const WD=['日','月','火','水','木','金','土'];

function aggregate(raw,offset){
  const now=toLocal(new Date().toISOString(),offset);
  const today=dateStr(now);
  const sinceLocal=toLocal(raw.since_utc,offset);
  const dates=[];
  let d=new Date(Date.UTC(sinceLocal.getUTCFullYear(),sinceLocal.getUTCMonth(),sinceLocal.getUTCDate()));
  const endD=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()));
  while(d<=endD){dates.push(dateStr(d));d=new Date(d.getTime()+86400000)}

  const daily={commits:{},prs:{},issues:{},add:{},del:{}};
  const repoCount={};
  const recentCommits=[];

  // Hourly by repo + hourly lines (today only)
  const hourlyByRepo={};  // repo -> {h: count}
  const hourlyAdd={};     // h -> total additions
  const hourlyDel={};     // h -> total deletions
  const todayRepos=new Set();

  for(const c of raw.commits){
    const loc=toLocal(c.utc,offset);
    const ds=dateStr(loc);
    daily.commits[ds]=(daily.commits[ds]||0)+1;
    daily.add[ds]=(daily.add[ds]||0)+c.add;
    daily.del[ds]=(daily.del[ds]||0)+c.del;
    repoCount[c.repo]=(repoCount[c.repo]||0)+1;
    if(ds===today){
      const h=loc.getUTCHours();
      todayRepos.add(c.repo);
      if(!hourlyByRepo[c.repo])hourlyByRepo[c.repo]={};
      hourlyByRepo[c.repo][h]=(hourlyByRepo[c.repo][h]||0)+1;
      hourlyAdd[h]=(hourlyAdd[h]||0)+c.add;
      hourlyDel[h]=(hourlyDel[h]||0)+c.del;
    }
    recentCommits.push({repo:c.repo,msg:c.msg,sha:c.sha,add:c.add,del:c.del,localDate:shortDate(loc),localTime:timeStr(loc),sortKey:c.utc});
  }

  for(const utc of raw.prs){const loc=toLocal(utc,offset);const ds=dateStr(loc);daily.prs[ds]=(daily.prs[ds]||0)+1}
  for(const utc of raw.issues){const loc=toLocal(utc,offset);const ds=dateStr(loc);daily.issues[ds]=(daily.issues[ds]||0)+1}

  let streak=0;
  for(let i=dates.length-1;i>=0;i--){if((daily.commits[dates[i]]||0)>0)streak++;else break}

  recentCommits.sort((a,b)=>b.sortKey.localeCompare(a.sortKey));
  const top20=recentCommits.slice(0,20);

  const tCommits=daily.commits[today]||0;
  const tPrs=daily.prs[today]||0;
  const tAdd=daily.add[today]||0;
  const tDel=daily.del[today]||0;
  const activeRepos=Object.keys(repoCount).length;

  let peakDay=dates[0],peakCount=0;
  for(const d of dates){const v=daily.commits[d]||0;if(v>peakCount){peakCount=v;peakDay=d}}

  // Sort today's repos by commit count
  const todayReposSorted=[...todayRepos].sort((a,b)=>{
    const ca=Object.values(hourlyByRepo[a]||{}).reduce((s,v)=>s+v,0);
    const cb=Object.values(hourlyByRepo[b]||{}).reduce((s,v)=>s+v,0);
    return cb-ca;
  });

  // Totals from server data
  const totalLoc=raw.total_loc||0;
  const openPrs=raw.open_prs||0;
  const openIssues=raw.open_issues||0;
  const repoLoc=raw.repo_loc||{};

  return {dates,daily,hourlyByRepo,hourlyAdd,hourlyDel,todayReposSorted,repoCount,streak,today,tCommits,tPrs,tAdd,tDel,activeRepos,top20,peakDay,peakCount,now,totalLoc,openPrs,openIssues,repoLoc};
}

function render(raw){
  const offset=CUR_TZ;
  const a=aggregate(raw,offset);
  const sign=offset>=0?'+':'';
  const tzLabel=`UTC${sign}${offset}`;

  CHARTS.forEach(c=>c.destroy());CHARTS=[];

  const labels=a.dates.map(d=>{const p=d.split('-');return parseInt(p[1])+'/'+parseInt(p[2])});
  const cmArr=a.dates.map(d=>a.daily.commits[d]||0);
  const prArr=a.dates.map(d=>a.daily.prs[d]||0);
  const isArr=a.dates.map(d=>a.daily.issues[d]||0);
  const adArr=a.dates.map(d=>a.daily.add[d]||0);
  const dlArr=a.dates.map(d=>a.daily.del[d]||0);
  const ntArr=adArr.map((v,i)=>v-dlArr[i]);
  const cumArr=[];ntArr.reduce((acc,v,i)=>{cumArr[i]=acc+v;return cumArr[i]},0);

  const totalC=cmArr.reduce((s,v)=>s+v,0);
  const totalPr=prArr.reduce((s,v)=>s+v,0);
  const totalIs=isArr.reduce((s,v)=>s+v,0);
  const totalAdd=adArr.reduce((s,v)=>s+v,0);
  const totalDel=dlArr.reduce((s,v)=>s+v,0);
  const totalNet=totalAdd-totalDel;

  const sortedRepos=Object.entries(a.repoCount).sort((x,y)=>y[1]-x[1]);
  const hLabels=Array.from({length:24},(_,i)=>String(i).padStart(2,'0'));

  // Build stacked hourly datasets per repo
  const hourlyDatasets=a.todayReposSorted.map((repo,idx)=>{
    const data=Array.from({length:24},(_,h)=>(a.hourlyByRepo[repo]||{})[h]||0);
    return {label:repo,data,backgroundColor:PALETTE[idx%PALETTE.length],borderRadius:idx===0?{topLeft:3,topRight:3}:0,barPercentage:.7};
  });

  // Hourly lines data
  const hAddArr=Array.from({length:24},(_,h)=>a.hourlyAdd[h]||0);
  const hDelArr=Array.from({length:24},(_,h)=>a.hourlyDel[h]||0);
  const hNetArr=hAddArr.map((v,i)=>v-hDelArr[i]);

  // Hourly legend HTML
  let hLegend=a.todayReposSorted.map((repo,i)=>`<span><span class="dot" style="background:${PALETTE[i%PALETTE.length]}"></span>${esc(repo)}</span>`).join('');

  let logHtml='';
  for(const c of a.top20){
    logHtml+=`<div class="commit-item"><span class="commit-time">${c.localDate} ${c.localTime}</span><span class="commit-repo">${esc(c.repo)}</span><span class="commit-msg">${esc(c.msg)}</span><span class="commit-sha">${c.sha}</span></div>`;
  }

  const tNet=a.tAdd-a.tDel;
  const nowLocal=a.now;
  const todayDisplay=`${nowLocal.getUTCFullYear()}/${nowLocal.getUTCMonth()+1}/${nowLocal.getUTCDate()}（${WD[nowLocal.getUTCDay()]}）`;
  const peakDisplay=parseInt(a.peakDay.split('-')[1])+'/'+parseInt(a.peakDay.split('-')[2]);
  const numDays=a.dates.length;
  const pS=a.dates[0].split('-');const pE=a.dates[a.dates.length-1].split('-');
  const periodStr=`${pS[0]}/${pS[1]}/${pS[2]} 〜 ${parseInt(pE[1])}/${parseInt(pE[2])}（${numDays}日間）`;
  const updLocal=toLocal(raw.updated_at_utc,offset);
  const updStr=`${updLocal.getUTCFullYear()}/${updLocal.getUTCMonth()+1}/${updLocal.getUTCDate()} ${timeStr(updLocal)} ${tzLabel}`;

  document.getElementById('dashboard').innerHTML=`
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-label">Today's Achievement</div>
        <div class="hero-date">📅 ${todayDisplay} <span style="font-size:12px;color:var(--text3)">${tzLabel}</span></div>
      </div>
      <div class="hero-badge">
        <span class="badge badge-streak">🔥 ${a.streak}日連続</span>
        <span class="badge badge-auto">⚡ 5min自動更新</span>
        <span class="badge" style="background:rgba(139,124,247,0.12);color:var(--purple)">${updStr} 時点</span>
      </div>
    </div>
    <div class="hero-grid">
      <div class="hero-stat"><div class="num">${a.tCommits}</div><div class="label">Commits</div><div class="equiv">≈ エンジニア${(a.tCommits/5).toFixed(1)}人日</div></div>
      <div class="hero-stat"><div class="num">${a.tPrs}</div><div class="label">Pull Requests</div><div class="pct">${a.openPrs>0?'Open '+a.openPrs+'件中 今日+'+a.tPrs+'件':'≈ エンジニア'+(a.tPrs/1).toFixed(1)+'人日'}</div></div>
      <div class="hero-stat"><div class="num">+${tNet.toLocaleString()}</div><div class="label">Net Lines</div><div class="pct">${a.totalLoc>0?fmtLoc(a.totalLoc)+'行中 +'+pctStr(tNet,a.totalLoc):'≈ エンジニア'+(Math.max(tNet,0)/100).toFixed(1)+'人日'}</div></div>
      <div class="hero-stat"><div class="num">${a.activeRepos}</div><div class="label">Active Repos</div><div class="pct">${a.openIssues>0?'Open Issue '+a.openIssues+'件':'&nbsp;'}</div></div>
    </div>
    <div class="hero-sub-stats">
      <span>📝 合計コード: ${fmtLoc(a.totalLoc)} 行（${a.activeRepos}リポジトリ）</span>
      <span>≈ エンジニア${(a.tCommits/5).toFixed(1)}人日分</span>
    </div>
    <div class="repo-delta-grid" id="repoDeltaGrid">
      ${buildRepoDeltaHTML(a)}
    </div>
    <div class="bench-note">※ 人日換算基準: コミット5回/日, PR 1件/日, コード純増100行/日 (<a href="https://blog.ndepend.com/mythical-man-month-10-lines-per-developer-day/" target="_blank" style="color:var(--purple)">NDepend研究</a>等に基づく一般的エンジニアの1日平均)</div>
  </div>

  <div class="grid-today">
    <div class="card">
      <h2><span class="icon">⏰</span> 今日の時間帯別アクティビティ <span style="font-size:11px;color:var(--text3)">${tzLabel}</span></h2>
      <div class="legend">${hLegend||'<span style="color:var(--text3)">No commits today</span>'}</div>
      <div class="chart-wrap h180"><canvas id="hourly"></canvas></div>
      <div class="sub-title">💻 時間帯別コード増減</div>
      <div class="legend"><span><span class="dot" style="background:rgba(34,197,94,0.6)"></span>追加</span><span><span class="dot" style="background:rgba(239,68,68,0.6)"></span>削除</span><span><span class="line-dot" style="background:#8b7cf7"></span>純増</span></div>
      <div class="chart-wrap h160"><canvas id="hourlyLines"></canvas></div>
    </div>
    <div class="card">
      <h2><span class="icon">📋</span> 直近コミットログ</h2>
      <div class="commit-list">${logHtml||'<div style="color:var(--text3);font-size:12px;padding:1rem">No commits yet today</div>'}</div>
    </div>
  </div>

  <div style="font-size:13px;color:var(--text3);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
    <span>📊 ${periodStr}</span>
    <span>ピーク: ${peakDisplay}（${a.peakCount}コミット）</span>
  </div>
  <div class="summary-bar">
    <div class="summary-item"><div class="val c-purple">${totalC.toLocaleString()}</div><div class="lbl">Total Commits</div></div>
    <div class="summary-item"><div class="val c-green">${totalPr.toLocaleString()}</div><div class="lbl">Total PRs</div></div>
    <div class="summary-item"><div class="val c-coral">${totalIs.toLocaleString()}</div><div class="lbl">Total Issues</div></div>
    <div class="summary-item"><div class="val c-blue">+${totalNet.toLocaleString()}</div><div class="lbl">Net Lines</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h2><span class="icon">📈</span> コミット / PR / Issue</h2>
      <div class="legend"><span><span class="dot" style="background:#8b7cf7"></span>コミット</span><span><span class="dot" style="background:#34d399"></span>PR</span><span><span class="dot" style="background:#ef4444"></span>Issue</span></div>
      <div class="chart-wrap h220"><canvas id="c1"></canvas></div>
    </div>
    <div class="card">
      <h2><span class="icon">💻</span> コード増減</h2>
      <div class="legend"><span><span class="dot" style="background:#22c55e"></span>追加</span><span><span class="dot" style="background:#ef4444"></span>削除</span><span><span class="line-dot" style="background:#8b7cf7"></span>純増</span></div>
      <div class="chart-wrap h220"><canvas id="c2"></canvas></div>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <h2><span class="icon">📦</span> リポジトリ別</h2>
      <div class="chart-wrap h220"><canvas id="c3"></canvas></div>
    </div>
    <div class="card">
      <h2><span class="icon">🚀</span> 累積コード純増</h2>
      <div class="chart-wrap h220"><canvas id="c4"></canvas></div>
    </div>
  </div>
  <div class="footer"><span id="autoRefresh" style="font-size:10px;color:var(--green);margin-right:12px">🔄 自動更新中</span>最終更新: ${updStr}　|　Powered by <a href="https://github.com/DaisukeHori/github-activity-dashboard">GitHub Actions</a></div>
  `;

  // === CHARTS ===

  // Hourly stacked bar by repo
  CHARTS.push(new Chart(document.getElementById('hourly'),{
    type:'bar',
    data:{labels:hLabels,datasets:hourlyDatasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT,
        callbacks:{label:c=>c.raw>0?c.dataset.label+': '+c.raw+' commits':null,
          footer:items=>{const t=items.reduce((s,i)=>s+i.raw,0);return t>0?'合計: '+t+' commits':''}
        }
      }},
      scales:{x:{grid:{display:false},ticks:{color:TC,font:{size:9}},stacked:true},
              y:{display:false,beginAtZero:true,stacked:true}}
    }
  }));

  // Hourly lines chart
  CHARTS.push(new Chart(document.getElementById('hourlyLines'),{
    type:'bar',
    data:{labels:hLabels,datasets:[
      {label:'追加',data:hAddArr,backgroundColor:'rgba(34,197,94,0.5)',borderRadius:3,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},
      {label:'削除',data:hDelArr.map(v=>-v),backgroundColor:'rgba(239,68,68,0.5)',borderRadius:3,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},
      {label:'純増',data:hNetArr,type:'line',borderColor:'#8b7cf7',borderWidth:1.5,pointRadius:0,fill:false,yAxisID:'y2',tension:.4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT,
        callbacks:{label:c=>{const v=c.raw;if(v===0)return null;return c.dataset.label+': '+(v<0?'':v>0&&c.dataset.label==='追加'?'+':'')+v.toLocaleString()+' 行'}}
      }},
      scales:{
        x:{grid:{display:false},ticks:{color:TC,font:{size:9}},stacked:true},
        y:{display:false,stacked:true},
        y2:{display:false,beginAtZero:true}
      }
    }
  }));

  // Daily activity
  CHARTS.push(new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:[{label:'コミット',data:cmArr,backgroundColor:'#8b7cf7',borderRadius:4,barPercentage:.6,categoryPercentage:.8},{label:'PR',data:prArr,backgroundColor:'#34d399',borderRadius:4,barPercentage:.6,categoryPercentage:.8},{label:'Issue',data:isArr,backgroundColor:'#ef4444',borderRadius:4,barPercentage:.6,categoryPercentage:.8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT}},scales:{x:{grid:{display:false},ticks:{color:TC,font:{size:10},autoSkip:false}},y:{grid:{color:G},ticks:{color:TC,font:{size:10}},beginAtZero:true}}}}));

  // Daily code
  CHARTS.push(new Chart(document.getElementById('c2'),{type:'bar',data:{labels,datasets:[{label:'追加',data:adArr,backgroundColor:'rgba(34,197,94,0.6)',borderRadius:4,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},{label:'削除',data:dlArr.map(d=>-d),backgroundColor:'rgba(239,68,68,0.6)',borderRadius:4,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},{label:'純増',data:ntArr,type:'line',borderColor:'#8b7cf7',borderWidth:2,pointRadius:2.5,pointBackgroundColor:'#8b7cf7',fill:false,yAxisID:'y2',tension:.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT,callbacks:{label:c=>{const v=c.raw;return c.dataset.label+': '+(v<0?'-':'+')+Math.abs(v).toLocaleString()+' 行'}}}},scales:{x:{grid:{display:false},ticks:{color:TC,font:{size:10},autoSkip:false},stacked:true},y:{grid:{color:G},ticks:{color:TC,font:{size:10},callback:v=>(v<0?'-':'')+(Math.abs(v)/1000).toFixed(0)+'k'},stacked:true,position:'left'},y2:{grid:{display:false},ticks:{color:'#8b7cf7',font:{size:10},callback:v=>(v/1000).toFixed(0)+'k'},position:'right',beginAtZero:true}}}}));

  // Repo chart
  const rn=sortedRepos.map(r=>r[0]),rc=sortedRepos.map(r=>r[1]),rColors=rn.map((_,i)=>PALETTE[i%PALETTE.length]);
  CHARTS.push(new Chart(document.getElementById('c3'),{type:'bar',data:{labels:rn,datasets:[{data:rc,backgroundColor:rColors,borderRadius:4,barPercentage:.55}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>c.raw.toLocaleString()+' commits'}}},scales:{x:{grid:{color:G},ticks:{color:TC,font:{size:10}},beginAtZero:true},y:{grid:{display:false},ticks:{color:'#a1a1aa',font:{size:10}}}}}}));

  // Cumulative
  CHARTS.push(new Chart(document.getElementById('c4'),{type:'line',data:{labels,datasets:[{label:'累積純増',data:cumArr,borderColor:'#3b82f6',borderWidth:2.5,pointRadius:2.5,pointBackgroundColor:'#3b82f6',fill:true,backgroundColor:function(ctx){const c=ctx.chart.ctx;const gr=c.createLinearGradient(0,0,0,ctx.chart.height);gr.addColorStop(0,'rgba(59,130,246,0.15)');gr.addColorStop(1,'rgba(59,130,246,0)');return gr},tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>'+'+c.raw.toLocaleString()+' 行'}}},scales:{x:{grid:{display:false},ticks:{color:TC,font:{size:10},autoSkip:false}},y:{grid:{color:G},ticks:{color:TC,font:{size:10},callback:v=>(v/1000).toFixed(0)+'k'},beginAtZero:true}}}}));
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

let LAST_UPDATE='';

function fetchData(){
  fetch('data.json?t='+Date.now())
    .then(r=>r.json())
    .then(data=>{
      if(data.updated_at_utc!==LAST_UPDATE){
        LAST_UPDATE=data.updated_at_utc;
        RAW=data;
        highlightTZ();
        render(data);
        console.log('[Dashboard] Data updated:',data.updated_at_utc);
      }
    })
    .catch(e=>{
      if(!RAW) document.getElementById('dashboard').innerHTML='<div class="loading">❌ Failed to load data.json</div>';
      console.error(e);
    });
}

// Initial load
fetchData();

// Auto-refresh: poll every 60s, detect new data
setInterval(fetchData, 60*1000);

// Also sync to cron: at :03 and :08 past each 5-min mark, do an extra fetch
// (cron runs at :00,:05,:10,...; data lands ~1-3 min later)
function scheduleNextSync(){
  const now=new Date();
  const min=now.getMinutes();
  const sec=now.getSeconds();
  // Next :03 or :08 past a 5-min boundary
  const targets=[3,8,13,18,23,28,33,38,43,48,53,58];
  let next=targets.find(t=>t>min)||(targets[0]+60);
  let delay=((next-min)*60-sec)*1000;
  if(delay<5000) delay+=300000; // avoid firing immediately
  setTimeout(()=>{fetchData();scheduleNextSync()},delay);
}
scheduleNextSync();
</script>
