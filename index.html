<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub活動ダッシュボード - DaisukeHori</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:rgba(255,255,255,0.06);--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--purple:#8b7cf7;--green:#22c55e;--coral:#ef4444;--blue:#3b82f6;--amber:#f59e0b;--cyan:#06b6d4;--radius:16px;--radius-sm:10px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.tz-bar,.period-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;flex-wrap:wrap}
.tz-bar label,.period-bar label{font-size:12px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.tz-btn,.period-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .15s}
.tz-btn:hover{border-color:var(--purple);color:var(--text)}
.tz-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.period-btn:hover{border-color:var(--cyan);color:var(--text)}
.period-btn.active{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:500}
.tz-custom{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 10px;border-radius:10px;font-family:'JetBrains Mono',monospace;width:70px;text-align:center}
.tz-custom:focus{outline:none;border-color:var(--purple)}
.tz-display,.period-display{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-left:auto}
.period-custom-range{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:14px}
.period-custom-range input{background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;width:115px;cursor:pointer}
.period-custom-range input:focus{outline:none}
.period-custom-range input::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer}
.hero{background:linear-gradient(135deg,rgba(139,124,247,0.08),rgba(34,197,94,0.06));border:1px solid var(--border);border-radius:20px;padding:2.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:radial-gradient(circle,rgba(139,124,247,0.08),transparent 70%);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.hero-label{font-size:13px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.hero-date{font-size:15px;font-weight:500;color:var(--text2)}
.hero-badge{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.badge-auto{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-streak{background:rgba(245,158,11,0.15);color:var(--amber);display:inline-flex;align-items:center;gap:4px}
.badge-streak .sub{font-size:9px;color:var(--text3);font-weight:400}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.hero-stat{text-align:center}
.hero-stat .num{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;margin-bottom:4px;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stat:nth-child(2) .num{background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat:nth-child(3) .num{background:linear-gradient(135deg,var(--amber),var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat:nth-child(4) .num{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stat .pct{font-size:10px;color:var(--cyan);margin-top:4px;font-weight:400;opacity:.9}
.hero-stat .equiv{font-size:11px;color:var(--amber);margin-top:4px;font-weight:400;opacity:.85}
.hero-stat .label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.hero-sub-stats{display:flex;gap:24px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);flex-wrap:wrap}
.repo-delta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:12px}
.repo-delta{background:rgba(255,255,255,0.03);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.repo-delta .rname{color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.repo-delta .rstat{display:flex;gap:8px;align-items:center;white-space:nowrap}
.repo-delta .rloc{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px}
.repo-delta .rpct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500}
.rpct.up{color:var(--green)}.rpct.down{color:var(--coral)}.rpct.zero{color:var(--text3)}
.bench-note{font-size:10px;color:var(--text3);margin-top:16px;text-align:right;opacity:.7}
.bench-note a{text-decoration:none}
/* === 日付ピッカー === */
.hero-date-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-picker-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:500;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s;position:relative}
.date-picker-btn:hover{background:rgba(139,124,247,0.12);border-color:var(--purple);color:#fff}
.date-picker-btn::after{content:'▾';font-size:10px;color:var(--text3);margin-left:2px}
.date-picker-btn:hover::after{color:var(--purple)}
.back-to-today{background:rgba(139,124,247,0.15);border:1px solid rgba(139,124,247,0.3);color:var(--purple);font-size:11px;padding:4px 10px;border-radius:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.back-to-today:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.past-day-banner{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--amber);font-size:11px;padding:4px 10px;border-radius:14px;margin-left:6px}
.snapshot-note{font-size:10px;color:var(--text3);opacity:.75;margin-left:4px}
#dateInput{position:absolute;opacity:0;pointer-events:none;width:0;height:0;left:0;top:0}
#dateInput::-webkit-calendar-picker-indicator{cursor:pointer}
.num{animation:fadeUp .6s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hero-stat:nth-child(2) .num{animation-delay:.1s}
.hero-stat:nth-child(3) .num{animation-delay:.2s}
.hero-stat:nth-child(4) .num{animation-delay:.3s}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-today{display:grid;grid-template-columns:3fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--surface);border-radius:var(--radius);padding:1.5rem;border:1px solid var(--border)}
.card h2{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .icon{font-size:16px}
.chart-wrap{position:relative;width:100%}
.h180{height:180px}.h220{height:220px}.h160{height:160px}.h280{height:280px}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.summary-item{background:var(--surface);border-radius:var(--radius-sm);padding:1rem;border:1px solid var(--border);text-align:center}
.summary-item .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.summary-item .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.c-purple{color:var(--purple)}.c-green{color:var(--green)}.c-coral{color:var(--coral)}.c-blue{color:var(--blue)}.c-amber{color:var(--amber)}.c-cyan{color:var(--cyan)}
.commit-list{max-height:380px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.commit-item{display:grid;grid-template-columns:80px 100px 1fr 50px;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.commit-item:last-child{border-bottom:none}
.commit-time{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px}
.commit-repo{color:var(--purple);font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.commit-msg{color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.commit-sha{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:10px;text-align:right}
.legend{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.line-dot{width:12px;height:2px;border-radius:1px;display:inline-block}
.footer{text-align:center;padding:2rem 0 1rem;font-size:11px;color:var(--text3)}
.footer a{color:var(--purple);text-decoration:none}
.loading{text-align:center;padding:4rem;color:var(--text3);font-size:14px}
.sub-title{font-size:12px;color:var(--text3);margin-top:16px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
/* === 月別セクション === */
.monthly-section{margin-top:32px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.section-header h3{font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.section-header .desc{font-size:11px;color:var(--text3)}
.monthly-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.monthly-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1.1rem 1.25rem;transition:all .15s;position:relative;overflow:hidden}
.monthly-card:hover{border-color:rgba(139,124,247,0.3);transform:translateY(-1px)}
.monthly-card.current{border-color:rgba(34,197,94,0.4);background:linear-gradient(135deg,rgba(34,197,94,0.05),transparent 60%)}
.month-label{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.month-label .month-tag{font-size:9px;background:rgba(34,197,94,0.15);color:var(--green);padding:2px 6px;border-radius:8px;font-weight:500}
.month-salary{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--amber),var(--coral));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px;line-height:1.2}
.month-persondays{font-size:11px;color:var(--amber);margin-bottom:12px;opacity:.9}
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;font-size:11px;padding-top:10px;border-top:1px solid var(--border)}
.month-grid .item{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0}
.month-grid .item .k{color:var(--text3);font-size:10px}
.month-grid .item .v{color:var(--text);font-family:'JetBrains Mono',monospace;font-weight:500;font-size:12px}
.month-grid .item .v.green{color:var(--green)}
.month-grid .item .v.purple{color:var(--purple)}
.month-grid .item .v.blue{color:var(--blue)}
.month-grid .item .v.coral{color:var(--coral)}
.month-grid .item .v.cyan{color:var(--cyan)}
.salary-note{font-size:10px;color:var(--text3);margin-top:10px;text-align:right;opacity:.75}
.salary-note a{color:var(--cyan);text-decoration:none}
.no-data-month{opacity:.4}
.no-data-month .month-salary{background:linear-gradient(135deg,var(--text3),var(--text3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
@media(max-width:768px){.container{padding:1rem}.hero-grid{grid-template-columns:repeat(2,1fr);gap:12px}.hero-stat .num{font-size:36px}.grid-2,.grid-today,.summary-bar{grid-template-columns:1fr}.commit-item{grid-template-columns:70px 80px 1fr 40px}.monthly-cards{grid-template-columns:1fr}.period-custom-range input{width:95px}}
</style>
</head>
<body>
<div class="container">
  <div class="tz-bar">
    <label>🌐 Timezone:</label>
    <button class="tz-btn" data-tz="9" onclick="setTZ(9)">JST (UTC+9)</button>
    <button class="tz-btn" data-tz="0" onclick="setTZ(0)">UTC</button>
    <button class="tz-btn" data-tz="-5" onclick="setTZ(-5)">EST (UTC-5)</button>
    <button class="tz-btn" data-tz="-8" onclick="setTZ(-8)">PST (UTC-8)</button>
    <button class="tz-btn" data-tz="8" onclick="setTZ(8)">CST (UTC+8)</button>
    <button class="tz-btn" data-tz="1" onclick="setTZ(1)">CET (UTC+1)</button>
    <span style="font-size:11px;color:var(--text3)">or</span>
    <input type="number" class="tz-custom" id="tzCustom" min="-12" max="14" step="1" placeholder="±hrs" onchange="setTZ(Number(this.value))">
    <span class="tz-display" id="tzDisplay"></span>
  </div>
  <div id="dashboard"><div class="loading">⏳ Loading data...</div></div>
</div>

<script>
Chart.defaults.font.family="'Noto Sans JP',sans-serif";
Chart.defaults.color='#71717a';
const G='rgba(255,255,255,0.04)',TC='#52525b';
const TT={backgroundColor:'#27272a',titleColor:'#fafafa',bodyColor:'#a1a1aa',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,cornerRadius:8};
const PALETTE=["#8b7cf7","#34d399","#fbbf24","#f97066","#60a5fa","#c084fc","#fb923c","#a78bfa","#38bdf8","#4ade80","#e879f9","#f472b6"];

// === 給与換算ベース ===
// ITエンジニア平均年収: 約550万円 (複数ソース中間値: doda 462万・経産省550万・厚労省738万の中間)
const SALARY_ANNUAL = 5500000;
const SALARY_PER_DAY = SALARY_ANNUAL / 365;  // 約15,068 円/日

function fmtLoc(n){if(n>=1000000)return (n/1000000).toFixed(1)+'M';if(n>=1000)return (n/1000).toFixed(1)+'K';return String(n)}
function fmtYen(n){if(n>=100000000)return '¥'+(n/100000000).toFixed(2)+'億';if(n>=10000000)return '¥'+(n/10000000).toFixed(2)+'千万';if(n>=10000)return '¥'+(n/10000).toFixed(1)+'万';return '¥'+Math.round(n).toLocaleString()}
function pctStr(delta,total){if(total<=0)return '—';const p=(delta/total*100);return (p>=0?'+':'')+p.toFixed(2)+'%'}

// === 状態 ===
let RAW=null, CHARTS=[], CUR_TZ=9, SELECTED_DATE=null;
let PERIOD_DAYS=14, PERIOD_RANGE=null;  // PERIOD_DAYS優先、PERIOD_RANGE={start,end}指定時はカスタム

const savedTz=localStorage.getItem('dashboard_tz');
if(savedTz!==null) CUR_TZ=Number(savedTz);
const savedPeriod=localStorage.getItem('dashboard_period');
if(savedPeriod!==null){
  try{const p=JSON.parse(savedPeriod);if(p.days){PERIOD_DAYS=p.days;PERIOD_RANGE=null}else if(p.range){PERIOD_DAYS=null;PERIOD_RANGE=p.range}}catch(e){}
}

function highlightTZ(){
  document.querySelectorAll('.tz-btn').forEach(b=>{b.classList.toggle('active',Number(b.dataset.tz)===CUR_TZ)});
  const sign=CUR_TZ>=0?'+':'';
  document.getElementById('tzDisplay').textContent=`UTC${sign}${CUR_TZ} — ${new Date().toLocaleString('ja-JP',{timeZone:tzName(CUR_TZ),hour:'2-digit',minute:'2-digit'})} now`;
  document.getElementById('tzCustom').value=CUR_TZ;
}
function tzName(offset){
  const map={9:'Asia/Tokyo',0:'UTC','-5':'America/New_York','-8':'America/Los_Angeles',8:'Asia/Shanghai',1:'Europe/Berlin'};
  return map[String(offset)]||'UTC';
}
function setTZ(offset){CUR_TZ=offset;localStorage.setItem('dashboard_tz',String(offset));highlightTZ();if(RAW)render(RAW)}

function highlightPeriod(){
  // active クラスは render() 内のテンプレートで直接付与するため、ここでは何もしない
  // (互換性のため関数は残置)
}
function setPeriod(days){
  PERIOD_DAYS=days;PERIOD_RANGE=null;
  localStorage.setItem('dashboard_period',JSON.stringify({days}));
  if(RAW)render(RAW);
}
function onCustomChange(){
  const s=document.getElementById('periodStart').value;
  const e=document.getElementById('periodEnd').value;
  if(s&&e&&s<=e){
    PERIOD_DAYS=null;PERIOD_RANGE={start:s,end:e};
    localStorage.setItem('dashboard_period',JSON.stringify({range:PERIOD_RANGE}));
    if(RAW)render(RAW);
  }
}

function toLocal(utcStr,offset){const d=new Date(utcStr);return new Date(d.getTime()+offset*3600000)}
function dateStr(d){return d.getFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')}
function shortDate(d){return(d.getUTCMonth()+1)+'/'+d.getUTCDate()}
function timeStr(d){return String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')}
const WD=['日','月','火','水','木','金','土'];

// === 期間取得 ===
function getPeriodDates(now){
  const dates=[];
  if(PERIOD_RANGE){
    const sParts=PERIOD_RANGE.start.split('-').map(Number);
    const eParts=PERIOD_RANGE.end.split('-').map(Number);
    let d=new Date(Date.UTC(sParts[0],sParts[1]-1,sParts[2]));
    const eD=new Date(Date.UTC(eParts[0],eParts[1]-1,eParts[2]));
    while(d<=eD){dates.push(dateStr(d));d=new Date(d.getTime()+86400000)}
  }else{
    const days=PERIOD_DAYS||14;
    const endD=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()));
    for(let i=days-1;i>=0;i--){const d=new Date(endD.getTime()-i*86400000);dates.push(dateStr(d))}
  }
  return dates;
}

function buildRepoDeltaHTML(a){
  if(!a.repoLoc||Object.keys(a.repoLoc).length===0)return '';
  const dayByRepo={};
  if(RAW&&RAW.commits){
    for(const c of RAW.commits){
      const loc=toLocal(c.utc,CUR_TZ);
      if(dateStr(loc)===a.selectedDay){
        if(!dayByRepo[c.repo])dayByRepo[c.repo]={add:0,del:0};
        dayByRepo[c.repo].add+=c.add;
        dayByRepo[c.repo].del+=c.del;
      }
    }
  }
  const sorted=Object.entries(a.repoLoc).sort((x,y)=>y[1]-x[1]);
  return sorted.map(([repo,loc])=>{
    const t=dayByRepo[repo]||{add:0,del:0};
    const net=t.add-t.del;
    const pct=loc>0?(net/loc*100):0;
    const cls=net>0?'up':net<0?'down':'zero';
    const sign=net>0?'+':'';
    return '<div class="repo-delta"><span class="rname">'+esc(repo)+'</span><span class="rstat"><span class="rloc">'+fmtLoc(loc)+'</span><span class="rpct '+cls+'">'+sign+pct.toFixed(2)+'%</span></span></div>';
  }).join('');
}

// === 集計関数 ===
function aggregate(raw,offset,selectedDayInput){
  const now=toLocal(new Date().toISOString(),offset);
  const today=dateStr(now);
  const selectedDay=selectedDayInput||today;
  const isToday=selectedDay===today;

  // 期間サマリー用の日付配列
  const periodDates=getPeriodDates(now);
  const periodDateSet=new Set(periodDates);

  // 全期間日別集計
  const daily={commits:{},prs:{},mergedPrs:{},issues:{},closedIssues:{},add:{},del:{}};
  const periodRepoCount={};  // 期間内のみ
  const commitsByDay={};

  // 選択日用
  const hourlyByRepo={};
  const hourlyAdd={};
  const hourlyDel={};
  const dayRepos=new Set();

  // === Commits ===
  for(const c of raw.commits){
    const loc=toLocal(c.utc,offset);
    const ds=dateStr(loc);
    daily.commits[ds]=(daily.commits[ds]||0)+1;
    daily.add[ds]=(daily.add[ds]||0)+c.add;
    daily.del[ds]=(daily.del[ds]||0)+c.del;
    if(periodDateSet.has(ds)){
      periodRepoCount[c.repo]=(periodRepoCount[c.repo]||0)+1;
    }
    if(ds===selectedDay){
      const h=loc.getUTCHours();
      dayRepos.add(c.repo);
      if(!hourlyByRepo[c.repo])hourlyByRepo[c.repo]={};
      hourlyByRepo[c.repo][h]=(hourlyByRepo[c.repo][h]||0)+1;
      hourlyAdd[h]=(hourlyAdd[h]||0)+c.add;
      hourlyDel[h]=(hourlyDel[h]||0)+c.del;
    }
    if(!commitsByDay[ds])commitsByDay[ds]=[];
    commitsByDay[ds].push({repo:c.repo,msg:c.msg,sha:c.sha,add:c.add,del:c.del,localDate:shortDate(loc),localTime:timeStr(loc),sortKey:c.utc});
  }

  // === PRs (新フォーマット: オブジェクト配列) ===
  for(const p of raw.prs){
    const utc=p.created_at||p;  // 互換性
    const loc=toLocal(utc,offset);
    const ds=dateStr(loc);
    daily.prs[ds]=(daily.prs[ds]||0)+1;
    if(p.merged_at){
      const mloc=toLocal(p.merged_at,offset);
      const mds=dateStr(mloc);
      daily.mergedPrs[mds]=(daily.mergedPrs[mds]||0)+1;
    }
  }

  // === Issues ===
  for(const i of raw.issues){
    const utc=i.created_at||i;
    const loc=toLocal(utc,offset);
    const ds=dateStr(loc);
    daily.issues[ds]=(daily.issues[ds]||0)+1;
    if(i.closed_at){
      const cloc=toLocal(i.closed_at,offset);
      const cds=dateStr(cloc);
      daily.closedIssues[cds]=(daily.closedIssues[cds]||0)+1;
    }
  }

  // === Streak (server-provided, true value) ===
  const streak=raw.streak||{};
  const currentStreak=streak.current_streak||0;
  const longestStreak=streak.longest_streak||0;
  const totalContributions=streak.total_contributions||0;

  // === 選択日のコミットログ ===
  const displayCommits=(commitsByDay[selectedDay]||[]).slice().sort((a,b)=>b.sortKey.localeCompare(a.sortKey));

  const tCommits=daily.commits[selectedDay]||0;
  const tPrs=daily.prs[selectedDay]||0;
  const tMergedPrs=daily.mergedPrs[selectedDay]||0;
  const tIssues=daily.issues[selectedDay]||0;
  const tAdd=daily.add[selectedDay]||0;
  const tDel=daily.del[selectedDay]||0;

  // === ピーク (期間内) ===
  let peakDay=periodDates[0],peakCount=0;
  for(const d of periodDates){const v=daily.commits[d]||0;if(v>peakCount){peakCount=v;peakDay=d}}
  const activeReposInPeriod=Object.keys(periodRepoCount).length;

  const dayReposSorted=[...dayRepos].sort((a,b)=>{
    const ca=Object.values(hourlyByRepo[a]||{}).reduce((s,v)=>s+v,0);
    const cb=Object.values(hourlyByRepo[b]||{}).reduce((s,v)=>s+v,0);
    return cb-ca;
  });

  const totalLoc=raw.total_loc||0;
  const openPrs=raw.open_prs||0;
  const openIssues=raw.open_issues||0;
  const repoLoc=raw.repo_loc||{};

  // Date picker range
  const dataMin=raw.since_utc?raw.since_utc.slice(0,10):today;
  const dataMax=today;

  return {
    periodDates,periodDateSet,daily,hourlyByRepo,hourlyAdd,hourlyDel,
    todayReposSorted:dayReposSorted,periodRepoCount,
    currentStreak,longestStreak,totalContributions,
    today,selectedDay,isToday,
    tCommits,tPrs,tMergedPrs,tIssues,tAdd,tDel,
    activeRepos:activeReposInPeriod,top20:displayCommits,
    peakDay,peakCount,now,totalLoc,openPrs,openIssues,repoLoc,
    dataMin,dataMax,
  };
}

// === 月別集計 (直近12ヶ月) ===
function aggregateMonthly(raw,offset){
  const monthly={};  // "YYYY-MM" -> stats
  function key(loc){return loc.getUTCFullYear()+'-'+String(loc.getUTCMonth()+1).padStart(2,'0')}
  function ensure(ym){
    if(!monthly[ym])monthly[ym]={commits:0,prs:0,mergedPrs:0,issues:0,closedIssues:0,add:0,del:0,repos:new Set()};
    return monthly[ym];
  }
  for(const c of raw.commits){
    const loc=toLocal(c.utc,offset);
    const m=ensure(key(loc));
    m.commits++;m.add+=c.add;m.del+=c.del;m.repos.add(c.repo);
  }
  for(const p of raw.prs){
    const utc=p.created_at||p;
    const loc=toLocal(utc,offset);
    const m=ensure(key(loc));
    m.prs++;
    if(p.merged_at){
      const mloc=toLocal(p.merged_at,offset);
      const mm=ensure(key(mloc));
      mm.mergedPrs++;
    }
  }
  for(const i of raw.issues){
    const utc=i.created_at||i;
    const loc=toLocal(utc,offset);
    const m=ensure(key(loc));
    m.issues++;
    if(i.closed_at){
      const cloc=toLocal(i.closed_at,offset);
      const mm=ensure(key(cloc));
      mm.closedIssues++;
    }
  }
  // 直近12ヶ月分の配列を返す
  const now=toLocal(new Date().toISOString(),offset);
  const months=[];
  for(let i=11;i>=0;i--){
    const d=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth()-i,1));
    const ym=key(d);
    const stats=monthly[ym]||{commits:0,prs:0,mergedPrs:0,issues:0,closedIssues:0,add:0,del:0,repos:new Set()};
    const net=stats.add-stats.del;
    // 人日換算: コミット数/5を主指標
    const personDays=stats.commits/5;
    const salary=personDays*SALARY_PER_DAY;
    months.push({
      ym,year:d.getUTCFullYear(),month:d.getUTCMonth()+1,
      commits:stats.commits,prs:stats.prs,mergedPrs:stats.mergedPrs,
      issues:stats.issues,closedIssues:stats.closedIssues,
      add:stats.add,del:stats.del,net,
      activeRepos:stats.repos.size,
      personDays,salary,
      isCurrent:i===0,
    });
  }
  return months;
}

        callbacks:{label:c=>c.raw>0?c.dataset.label+': '+c.raw+' commits':null,
          footer:items=>{const t=items.reduce((s,i)=>s+i.raw,0);return t>0?'合計: '+t+' commits':''}
        }
      }},
      scales:{x:{grid:{display:false},ticks:{color:TC,font:{size:9}},stacked:true},
              y:{display:false,beginAtZero:true,stacked:true}}
    }
  }));

  // Hourly lines chart
  CHARTS.push(new Chart(document.getElementById('hourlyLines'),{
    type:'bar',
    data:{labels:hLabels,datasets:[
      {label:'追加',data:hAddArr,backgroundColor:'rgba(34,197,94,0.5)',borderRadius:3,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},
      {label:'削除',data:hDelArr.map(v=>-v),backgroundColor:'rgba(239,68,68,0.5)',borderRadius:3,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},
      {label:'純増',data:hNetArr,type:'line',borderColor:'#8b7cf7',borderWidth:1.5,pointRadius:0,fill:false,yAxisID:'y2',tension:.4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT,
        callbacks:{label:c=>{const v=c.raw;if(v===0)return null;return c.dataset.label+': '+(v<0?'':v>0&&c.dataset.label==='追加'?'+':'')+v.toLocaleString()+' 行'}}
      }},
      scales:{
        x:{grid:{display:false},ticks:{color:TC,font:{size:9}},stacked:true},
        y:{display:false,stacked:true},
        y2:{display:false,beginAtZero:true}
      }
    }
  }));

  // Daily activity (期間プリセット対応)
  CHARTS.push(new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:[{label:'コミット',data:cmArr,backgroundColor:'#8b7cf7',borderRadius:4,barPercentage:.6,categoryPercentage:.8},{label:'PR',data:prArr,backgroundColor:'#34d399',borderRadius:4,barPercentage:.6,categoryPercentage:.8},{label:'Issue',data:isArr,backgroundColor:'#ef4444',borderRadius:4,barPercentage:.6,categoryPercentage:.8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT}},scales:{x:{grid:{display:false},ticks:xTicksConfig},y:{grid:{color:G},ticks:{color:TC,font:{size:10}},beginAtZero:true}}}}));

  // Daily code (期間プリセット対応)
  CHARTS.push(new Chart(document.getElementById('c2'),{type:'bar',data:{labels,datasets:[{label:'追加',data:adArr,backgroundColor:'rgba(34,197,94,0.6)',borderRadius:4,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},{label:'削除',data:dlArr.map(d=>-d),backgroundColor:'rgba(239,68,68,0.6)',borderRadius:4,barPercentage:.5,categoryPercentage:.85,yAxisID:'y'},{label:'純増',data:ntArr,type:'line',borderColor:'#8b7cf7',borderWidth:2,pointRadius:periodLabelMode==='day'?2.5:1,pointBackgroundColor:'#8b7cf7',fill:false,yAxisID:'y2',tension:.35}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT,callbacks:{label:c=>{const v=c.raw;return c.dataset.label+': '+(v<0?'-':'+')+Math.abs(v).toLocaleString()+' 行'}}}},scales:{x:{grid:{display:false},ticks:xTicksConfig,stacked:true},y:{grid:{color:G},ticks:{color:TC,font:{size:10},callback:v=>(v<0?'-':'')+(Math.abs(v)/1000).toFixed(0)+'k'},stacked:true,position:'left'},y2:{grid:{display:false},ticks:{color:'#8b7cf7',font:{size:10},callback:v=>(v/1000).toFixed(0)+'k'},position:'right',beginAtZero:true}}}}));

  // Repo chart
  const rn=sortedRepos.map(r=>r[0]),rc=sortedRepos.map(r=>r[1]),rColors=rn.map((_,i)=>PALETTE[i%PALETTE.length]);
  CHARTS.push(new Chart(document.getElementById('c3'),{type:'bar',data:{labels:rn,datasets:[{data:rc,backgroundColor:rColors,borderRadius:4,barPercentage:.55}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>c.raw.toLocaleString()+' commits'}}},scales:{x:{grid:{color:G},ticks:{color:TC,font:{size:10}},beginAtZero:true},y:{grid:{display:false},ticks:{color:'#a1a1aa',font:{size:10}}}}}}));

  // Cumulative
  CHARTS.push(new Chart(document.getElementById('c4'),{type:'line',data:{labels,datasets:[{label:'累積純増',data:cumArr,borderColor:'#3b82f6',borderWidth:2.5,pointRadius:periodLabelMode==='day'?2.5:1,pointBackgroundColor:'#3b82f6',fill:true,backgroundColor:function(ctx){const c=ctx.chart.ctx;const gr=c.createLinearGradient(0,0,0,ctx.chart.height);gr.addColorStop(0,'rgba(59,130,246,0.15)');gr.addColorStop(1,'rgba(59,130,246,0)');return gr},tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>(c.raw>=0?'+':'')+c.raw.toLocaleString()+' 行'}}},scales:{x:{grid:{display:false},ticks:xTicksConfig},y:{grid:{color:G},ticks:{color:TC,font:{size:10},callback:v=>(v/1000).toFixed(0)+'k'}}}}}));

  // === 月別推移チャート ===
  CHARTS.push(new Chart(document.getElementById('monthlyTrend'),{
    type:'bar',
    data:{
      labels:monthlyLabels,
      datasets:[
        {label:'コミット数',data:monthlyCommits,backgroundColor:'rgba(139,124,247,0.7)',borderRadius:4,barPercentage:.6,categoryPercentage:.85,yAxisID:'y'},
        {label:'マージPR',type:'line',data:monthlyMergedPrs,borderColor:'#34d399',borderWidth:2,pointRadius:3,pointBackgroundColor:'#34d399',fill:false,yAxisID:'y',tension:.3},
        {label:'給与換算',type:'line',data:monthlySalary,borderColor:'#fbbf24',borderWidth:2,pointRadius:3,pointBackgroundColor:'#fbbf24',fill:false,yAxisID:'y2',tension:.3},
      ],
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,...TT,
        callbacks:{label:c=>{
          if(c.dataset.label==='給与換算')return c.dataset.label+': '+fmtYen(c.raw);
          return c.dataset.label+': '+c.raw.toLocaleString();
        }}
      }},
      scales:{
        x:{grid:{display:false},ticks:{color:TC,font:{size:10}}},
        y:{grid:{color:G},ticks:{color:TC,font:{size:10}},beginAtZero:true,position:'left'},
        y2:{grid:{display:false},ticks:{color:'#fbbf24',font:{size:10},callback:v=>fmtYen(v)},beginAtZero:true,position:'right'},
      }
    }
  }));
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// === 日付ピッカー ===
function openDatePicker(){
  const inp=document.getElementById('dateInput');
  if(!inp)return;
  try{inp.showPicker()}catch(e){inp.focus();inp.click()}
}
function onDateChange(ev){
  const v=ev.target.value;
  if(!v)return;
  const now=toLocal(new Date().toISOString(),CUR_TZ);
  const todayStr=dateStr(now);
  SELECTED_DATE=(v===todayStr)?null:v;
  if(RAW)render(RAW);
}
function resetToToday(){SELECTED_DATE=null;if(RAW)render(RAW)}

let LAST_UPDATE='';

function fetchData(){
  fetch('data.json?t='+Date.now())
    .then(r=>r.json())
    .then(data=>{
      if(data.updated_at_utc!==LAST_UPDATE){
        LAST_UPDATE=data.updated_at_utc;
        RAW=data;
        highlightTZ();
        highlightPeriod();
        render(data);
        console.log('[Dashboard] Data updated:',data.updated_at_utc);
      }
    })
    .catch(e=>{
      if(!RAW) document.getElementById('dashboard').innerHTML='<div class="loading">❌ Failed to load data.json</div>';
      console.error(e);
    });
}

// Initial load
fetchData();
setInterval(fetchData, 60*1000);

function scheduleNextSync(){
  const now=new Date();
  const min=now.getMinutes();
  const sec=now.getSeconds();
  const targets=[3,8,13,18,23,28,33,38,43,48,53,58];
  let next=targets.find(t=>t>min)||(targets[0]+60);
  let delay=((next-min)*60-sec)*1000;
  if(delay<5000) delay+=300000;
  setTimeout(()=>{fetchData();scheduleNextSync()},delay);
}
scheduleNextSync();
</script>
