name: Update Dashboard

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "dashboard-update"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch stats (incremental)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/fetch_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json commits_db.json prs_db.json issues_db.json streak_db.json archive/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📊 Update data $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          # push リトライ (3回まで、競合時は rebase してから再push)
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, fetching and rebasing..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1
